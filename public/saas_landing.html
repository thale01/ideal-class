<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuturaSaaS | Next Gen Platform</title>
    <link rel="stylesheet" href="saas_landing.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
    </style>
</head>
<body>
    <div class="bg-glow-circle bg-circle-1"></div>
    <div class="bg-glow-circle bg-circle-2"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <div class="logo-box"></div>
                <span>FUTURA</span>
            </div>
            <div class="nav-links">
                <div class="menu-item placeholder-line"></div>
                <div class="menu-item placeholder-line"></div>
                <div class="menu-item placeholder-line"></div>
                <a href="#" class="btn btn-gradient">Get Started</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-container">
            <div class="hero-left">
                <div class="hero-badge">NEW V2.0 IS LIVE</div>
                <div class="heading-block h-40 w-full mb-4"></div>
                <div class="heading-block h-40 w-80 mb-8"></div>
                <div class="subtitle-block w-full mb-2"></div>
                <div class="subtitle-block w-90 mb-10"></div>
                <div class="hero-btns">
                    <a href="#" class="btn btn-gradient">Start Free Trial</a>
                    <a href="#" class="btn btn-outline">Watch Demo</a>
                </div>
            </div>
            <div class="hero-right">
                <div class="hero-image-wrapper">
                    <div class="hero-glow-bg"></div>
                    <img src="https://images.unsplash.com/photo-1551434678-e076c223a692?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80" alt="Tech Startup Team" class="hero-img">
                </div>
            </div>
        </div>
    </section>

    <!-- Clients Section -->
    <section class="clients">
        <div class="container">
            <div class="section-heading placeholder-line mx-auto mb-10" style="width: 200px;"></div>
            <div class="client-logos">
                <div class="logo-placeholder"></div>
                <div class="logo-placeholder"></div>
                <div class="logo-placeholder"></div>
                <div class="logo-placeholder"></div>
                <div class="logo-placeholder"></div>
            </div>
        </div>
    </section>

    <!-- Services Section -->
    <section class="services">
        <div class="container">
            <div class="grid grid-cols-3">
                <!-- Card 1 -->
                <div class="service-card">
                    <div class="icon-placeholder mb-6"></div>
                    <div class="title-block mb-4"></div>
                    <div class="desc-line w-full mb-2"></div>
                    <div class="desc-line w-full mb-2"></div>
                    <div class="desc-line w-80 mb-8"></div>
                    <div class="btn-placeholder"></div>
                </div>
                <!-- Card 2 -->
                <div class="service-card">
                    <div class="icon-placeholder mb-6"></div>
                    <div class="title-block mb-4"></div>
                    <div class="desc-line w-full mb-2"></div>
                    <div class="desc-line w-full mb-2"></div>
                    <div class="desc-line w-80 mb-8"></div>
                    <div class="btn-placeholder"></div>
                </div>
                <!-- Card 3 -->
                <div class="service-card">
                    <div class="icon-placeholder mb-6"></div>
                    <div class="title-block mb-4"></div>
                    <div class="desc-line w-full mb-2"></div>
                    <div class="desc-line w-full mb-2"></div>
                    <div class="desc-line w-80 mb-8"></div>
                    <div class="btn-placeholder"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Feature Section -->
    <section class="features">
        <div class="container feature-container">
            <div class="feature-left">
                <div class="subtitle-block w-40 mb-4" style="background: var(--blue-glow);"></div>
                <div class="heading-block h-30 w-full mb-6"></div>
                <div class="desc-line w-full mb-2"></div>
                <div class="desc-line w-full mb-2"></div>
                <div class="desc-line w-90 mb-8"></div>
                <div class="btn-placeholder w-40"></div>
            </div>
            <div class="feature-right">
                <div class="feature-image-placeholder mb-10"></div>
                <div class="feature-cards-stack">
                    <div class="feature-item active">
                        <div class="check-icon"></div>
                        <div class="placeholder-line w-60"></div>
                    </div>
                    <div class="feature-item">
                        <div class="check-icon"></div>
                        <div class="placeholder-line w-60"></div>
                    </div>
                    <div class="feature-item">
                        <div class="check-icon"></div>
                        <div class="placeholder-line w-60"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
